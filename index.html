<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职业天赋测评系统 - VIP版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #4f9cf9 0%, #6c63ff 100%);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            color: white;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        /* Activation Screen */
        .activation-screen {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto;
        }

        .activation-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .activation-screen h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.8em;
        }

        .activation-screen p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .activation-input {
            width: 100%;
            padding: 18px 25px;
            font-size: 1.3em;
            text-align: center;
            letter-spacing: 4px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            margin-bottom: 20px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .activation-input:focus {
            outline: none;
            border-color: #4f9cf9;
            box-shadow: 0 0 0 4px rgba(79, 156, 249, 0.1);
        }

        .activation-btn {
            width: 100%;
            padding: 18px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #4f9cf9 0%, #6c63ff 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .activation-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 156, 249, 0.4);
        }

        .activation-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #e74c3c;
            margin-top: 15px;
            font-size: 0.95em;
            display: none;
        }

        .success-message {
            color: #27ae60;
            margin-top: 15px;
            font-size: 0.95em;
            display: none;
        }

        .device-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 0.85em;
            color: #666;
        }

        /* Progress Bar */
        .progress-container {
            background: white;
            border-radius: 15px;
            padding: 20px 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-title {
            font-weight: 600;
            color: #333;
        }

        .progress-percent {
            font-weight: 700;
            color: #4f9cf9;
            font-size: 1.1em;
        }

        .progress-bar {
            height: 10px;
            background: #e9ecef;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4f9cf9 0%, #6c63ff 100%);
            border-radius: 5px;
            transition: width 0.5s ease;
        }

        .section-tag {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            margin-top: 10px;
        }

        .tag-holland { background: #e3f2fd; color: #1976d2; }
        .tag-bigfive { background: #f3e5f5; color: #7b1fa2; }
        .tag-scenario { background: #e8f5e9; color: #388e3c; }
        .tag-ability { background: #fff3e0; color: #f57c00; }
        .tag-values { background: #fce4ec; color: #c2185b; }
        .tag-exclusion { background: #ffebee; color: #c62828; }

        /* Question Card */
        .question-card {
            background: white;
            border-radius: 20px;
            padding: 35px 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-number {
            color: #4f9cf9;
            font-weight: 700;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 1.2em;
            line-height: 1.7;
            color: #333;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* Likert Scale */
        .likert-scale {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .likert-option {
            flex: 1;
            min-width: 60px;
            padding: 15px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }

        .likert-option:hover {
            border-color: #4f9cf9;
            background: #f8fbff;
        }

        .likert-option.selected {
            background: linear-gradient(135deg, #4f9cf9 0%, #6c63ff 100%);
            color: white;
            border-color: transparent;
        }

        .likert-number {
            font-size: 1.5em;
            font-weight: 700;
            display: block;
            margin-bottom: 5px;
        }

        .likert-label {
            font-size: 0.75em;
            opacity: 0.8;
        }

        /* Scenario Options */
        .scenario-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .scenario-option {
            padding: 18px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .scenario-option:hover {
            border-color: #4f9cf9;
            background: #f8fbff;
        }

        .scenario-option.selected {
            background: linear-gradient(135deg, #4f9cf9 0%, #6c63ff 100%);
            color: white;
            border-color: transparent;
        }

        .scenario-letter {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        .scenario-option.selected .scenario-letter {
            background: rgba(255,255,255,0.3);
        }

        /* Exclusion Options */
        .exclusion-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .exclusion-option {
            padding: 18px 20px;
            border: 2px solid #ffcdd2;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            background: #fff8f8;
        }

        .exclusion-option:hover {
            border-color: #ef5350;
            background: #ffebee;
        }

        .exclusion-option.selected {
            background: linear-gradient(135deg, #ef5350 0%, #c62828 100%);
            color: white;
            border-color: transparent;
        }

        /* Navigation */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 30px;
        }

        .nav-btn {
            padding: 15px 35px;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }

        .nav-btn-prev {
            background: #f0f0f0;
            color: #666;
        }

        .nav-btn-prev:hover {
            background: #e0e0e0;
        }

        .nav-btn-next {
            background: linear-gradient(135deg, #4f9cf9 0%, #6c63ff 100%);
            color: white;
        }

        .nav-btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 156, 249, 0.4);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Results Page */
        .results-container {
            display: none;
        }

        .results-header {
            background: linear-gradient(135deg, #4f9cf9 0%, #6c63ff 100%);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .results-header h2 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .holland-code {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 2.5em;
            font-weight: 700;
            letter-spacing: 10px;
            margin: 20px 0;
        }

        .result-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .result-section h3 {
            color: #333;
            margin-bottom: 25px;
            font-size: 1.4em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-section h3::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, #4f9cf9 0%, #6c63ff 100%);
            border-radius: 2px;
        }

        /* Radar Chart Container */
        .chart-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        #radarChart {
            max-width: 100%;
        }

        /* Bar Chart */
        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bar-item {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .bar-label {
            width: 100px;
            font-weight: 600;
            color: #555;
            font-size: 0.95em;
        }

        .bar-track {
            flex: 1;
            height: 30px;
            background: #f0f0f0;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            border-radius: 15px;
            transition: width 1s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
            color: white;
            font-weight: 600;
            font-size: 0.9em;
        }

        .bar-o { background: linear-gradient(90deg, #9c27b0, #e1bee7); }
        .bar-c { background: linear-gradient(90deg, #4caf50, #c8e6c9); }
        .bar-e { background: linear-gradient(90deg, #ff9800, #ffe0b2); }
        .bar-a { background: linear-gradient(90deg, #2196f3, #bbdefb); }
        .bar-n { background: linear-gradient(90deg, #f44336, #ffcdd2); }

        .bar-value {
            width: 50px;
            text-align: right;
            font-weight: 700;
            color: #333;
        }

        /* Recommendations */
        .recommendation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .recommendation-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            border-left: 4px solid #4f9cf9;
        }

        .recommendation-card h4 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .recommendation-card ul {
            list-style: none;
            padding: 0;
        }

        .recommendation-card li {
            padding: 8px 0;
            color: #555;
            position: relative;
            padding-left: 20px;
        }

        .recommendation-card li::before {
            content: '•';
            color: #4f9cf9;
            position: absolute;
            left: 0;
            font-weight: bold;
        }

        /* Exclusion Summary */
        .exclusion-summary {
            background: #ffebee;
            border-radius: 15px;
            padding: 25px;
            border: 2px solid #ffcdd2;
        }

        .exclusion-summary h4 {
            color: #c62828;
            margin-bottom: 15px;
        }

        .exclusion-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .exclusion-tag {
            background: #ef5350;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .action-btn {
            padding: 15px 40px;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }

        .action-btn-primary {
            background: linear-gradient(135deg, #4f9cf9 0%, #6c63ff 100%);
            color: white;
        }

        .action-btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        /* Holland Types Legend */
        .holland-legend {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .holland-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .holland-letter {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 1.1em;
        }

        .holland-r { background: #e53935; }
        .holland-i { background: #1e88e5; }
        .holland-a { background: #fb8c00; }
        .holland-s { background: #43a047; }
        .holland-e { background: #8e24aa; }
        .holland-c { background: #546e7a; }

        .holland-name {
            font-size: 0.9em;
            color: #555;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }

            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 1.7em;
            }

            .question-card {
                padding: 25px 20px;
            }

            .likert-scale {
                gap: 8px;
            }

            .likert-option {
                min-width: 50px;
                padding: 12px 8px;
            }

            .likert-number {
                font-size: 1.2em;
            }

            .likert-label {
                font-size: 0.65em;
            }

            .holland-legend {
                grid-template-columns: repeat(2, 1fr);
            }

            .holland-code {
                font-size: 1.8em;
                padding: 12px 25px;
            }

            .bar-label {
                width: 80px;
                font-size: 0.85em;
            }
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header" id="mainHeader">
            <h1>职业天赋测评系统</h1>
            <p>全面评估你的职业兴趣、性格特质与发展潜力</p>
        </div>

        <!-- Activation Screen -->
        <div class="activation-screen" id="activationScreen">
            <div class="activation-icon">🔐</div>
            <h2>激活您的测评</h2>
            <p>请输入您的8位激活码以开始测评<br>每个激活码最多可在3台设备上使用</p>
            <input type="text" class="activation-input" id="activationCode" placeholder="输入激活码" maxlength="8">
            <button class="activation-btn" id="activateBtn" onclick="activate()">激活并开始测评</button>
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            <div class="device-info">
                <div>设备信息已加密保护，仅用于防止激活码滥用</div>
                <div id="deviceFingerprint" style="margin-top:5px;font-family:monospace;font-size:0.8em;"></div>
            </div>
        </div>

        <!-- Assessment Container -->
        <div class="assessment-container hidden" id="assessmentContainer">
            <!-- Progress -->
            <div class="progress-container">
                <div class="progress-header">
                    <span class="progress-title">测评进度</span>
                    <span class="progress-percent" id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <span class="section-tag" id="sectionTag">霍兰德职业兴趣</span>
            </div>

            <!-- Question Card -->
            <div class="question-card" id="questionCard">
                <div class="question-number" id="questionNumber">问题 1 / 158</div>
                <div class="question-text" id="questionText"></div>
                <div class="options-container" id="optionsContainer"></div>
            </div>

            <!-- Navigation -->
            <div class="nav-buttons">
                <button class="nav-btn nav-btn-prev" id="prevBtn" onclick="previousQuestion()">上一题</button>
                <button class="nav-btn nav-btn-next" id="nextBtn" onclick="nextQuestion()">下一题</button>
            </div>
        </div>

        <!-- Results Container -->
        <div class="results-container" id="resultsContainer">
            <div class="results-header">
                <h2>您的测评结果</h2>
                <div class="holland-code" id="hollandCode">---</div>
                <p id="hollandDesc">完成测评后查看您的霍兰德职业代码</p>
            </div>

            <!-- Holland Radar Chart -->
            <div class="result-section">
                <h3>霍兰德职业兴趣分析</h3>
                <div class="chart-container">
                    <canvas id="radarChart" width="400" height="350"></canvas>
                </div>
                <div class="holland-legend" id="hollandLegend"></div>
            </div>

            <!-- Big Five Results -->
            <div class="result-section">
                <h3>大五人格特质</h3>
                <div class="bar-chart" id="bigFiveChart"></div>
            </div>

            <!-- Industry Recommendations -->
            <div class="result-section">
                <h3>推荐行业方向</h3>
                <div class="recommendation-grid" id="industryRecs"></div>
            </div>

            <!-- Job Recommendations -->
            <div class="result-section">
                <h3>推荐职业类型</h3>
                <div class="recommendation-grid" id="jobRecs"></div>
            </div>

            <!-- Development Focus -->
            <div class="result-section">
                <h3>发展建议</h3>
                <div class="recommendation-grid" id="developmentFocus"></div>
            </div>

            <!-- Environment Recommendations -->
            <div class="result-section">
                <h3>适合的工作环境</h3>
                <div class="recommendation-card" id="environmentRecs"></div>
            </div>

            <!-- Exclusion Summary -->
            <div class="result-section">
                <h3>职业排除建议</h3>
                <div class="exclusion-summary" id="exclusionSummary"></div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="action-btn action-btn-primary" onclick="downloadResults()">下载报告</button>
                <button class="action-btn action-btn-secondary" onclick="retakeAssessment()">重新测评</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== DATA ====================
        const questions = [
            // Part 1: Holland (48 questions)
            // R (现实型) 8题
            {id: 1, type: 'holland', category: 'R', text: '我喜欢亲自动手修理或组装物品'},
            {id: 2, type: 'holland', category: 'R', text: '我享受使用工具、机械或技术设备的过程'},
            {id: 3, type: 'holland', category: 'R', text: '我更喜欢做有具体产出和可见成果的工作'},
            {id: 4, type: 'holland', category: 'R', text: '我喜欢户外活动或需要身体参与的任务'},
            {id: 5, type: 'holland', category: 'R', text: '我对事物的工作原理有浓厚兴趣，喜欢拆解研究'},
            {id: 6, type: 'holland', category: 'R', text: '我擅长空间想象，能看懂图纸或技术图纸'},
            {id: 7, type: 'holland', category: 'R', text: '我享受完成一个实体项目带来的成就感'},
            {id: 8, type: 'holland', category: 'R', text: '我认为自己动手解决问题比求助他人更有满足感'},
            // I (研究型) 8题
            {id: 9, type: 'holland', category: 'I', text: '我喜欢深入分析问题，不满足于表面答案'},
            {id: 10, type: 'holland', category: 'I', text: '我享受阅读科技、学术或专业领域的文章'},
            {id: 11, type: 'holland', category: 'I', text: '我善于发现数据中的规律和隐藏模式'},
            {id: 12, type: 'holland', category: 'I', text: '我喜欢独立思考，不急于下结论'},
            {id: 13, type: 'holland', category: 'I', text: '我对解决复杂的技术或理论问题感到兴奋'},
            {id: 14, type: 'holland', category: 'I', text: '我习惯用系统化的方法分析问题'},
            {id: 15, type: 'holland', category: 'I', text: '我享受探索未知领域的过程'},

        // ==================== STATE ====================
        let currentQuestion = 0;
        let answers = {};
        let deviceFingerprint = '';
        let activatedCode = '';

        // ==================== DEVICE FINGERPRINTING ====================
        function generateDeviceFingerprint() {
            const components = [
                navigator.userAgent,
                screen.width + 'x' + screen.height,
                screen.colorDepth,
                Intl.DateTimeFormat().resolvedOptions().timeZone,
                getCanvasFingerprint()
            ];
            const fingerprint = hashString(components.join('|'));
            deviceFingerprint = fingerprint.substring(0, 16);
            document.getElementById('deviceFingerprint').textContent = '设备ID: ' + deviceFingerprint;
            return deviceFingerprint;
        }

        function getCanvasFingerprint() {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 200;
                canvas.height = 50;
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillStyle = '#f60';
                ctx.fillRect(0, 0, 200, 50);
                ctx.fillStyle = '#069';
                ctx.fillText('Career Assessment', 10, 15);
                return canvas.toDataURL().slice(-50);
            } catch (e) {
                return 'canvas-error';
            }
        }

        function hashString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16).padStart(16, '0');
        }

        // ==================== ACTIVATION ====================
        function checkActivation() {
            const saved = localStorage.getItem('careerAssessmentActivation');
            if (saved) {
                const data = JSON.parse(saved);
                const currentDevice = generateDeviceFingerprint();
                activatedCode = data.code;
                
                // Check if this device is already registered
                if (data.devices && data.devices.includes(currentDevice)) {
                    showAssessment();
                    return;
                }
                
                // Check if code has reached device limit
                if (data.devices && data.devices.length >= 3) {
                    showError('该激活码已达到最大设备数量限制（3台）');
                    return;
                }
            }
            
            generateDeviceFingerprint();
        }

        function activate() {
            const code = document.getElementById('activationCode').value.toUpperCase().trim();
            
            if (code.length !== 8) {
                showError('请输入8位激活码');
                return;
            }
            
            // Validate code format
            if (!/^[A-Z0-9]{8}$/.test(code)) {
                showError('激活码格式不正确，请输入8位字母和数字组合');
                return;
            }
            
            // Check if code exists in system
            const codes = JSON.parse(localStorage.getItem('careerAssessmentCodes') || '[]');
            const codeData = codes.find(c => c.code === code);
            
            if (!codeData) {
                showError('无效的激活码，请检查输入或联系卖家');
                return;
            }
            
            if (codeData.used && codeData.devices && codeData.devices.length >= 3) {
                showError('该激活码已达到最大设备数量限制（3台）');
                return;
            }
            
            // Activate
            const currentDevice = generateDeviceFingerprint();
            
            if (!codeData.devices) {
                codeData.devices = [];
            }
            
            if (!codeData.devices.includes(currentDevice)) {
                codeData.devices.push(currentDevice);
            }
            
            codeData.used = true;
            codeData.activatedAt = new Date().toISOString();
            
            localStorage.setItem('careerAssessmentCodes', JSON.stringify(codes));
            
            // Save local activation
            localStorage.setItem('careerAssessmentActivation', JSON.stringify({
                code: code,
                devices: codeData.devices,
                activatedAt: codeData.activatedAt
            }));
            
            activatedCode = code;
            showSuccess('激活成功！正在进入测评...');
            
            setTimeout(() => {
                showAssessment();
            }, 1000);
        }

        function showError(msg) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
        }

        function showSuccess(msg) {
            const successEl = document.getElementById('successMessage');
            successEl.textContent = msg;
            successEl.style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }

        function showAssessment() {
            document.getElementById('activationScreen').classList.add('hidden');
            document.getElementById('assessmentContainer').classList.remove('hidden');
            renderQuestion();
        }

        // ==================== QUESTION RENDERING ====================
        function getSectionName(type) {
            const names = {
                'holland': '霍兰德职业兴趣',
                'bigfive': '大五人格评估',
                'scenario': '情境判断题',
                'ability': '核心能力自评',
                'values': '职业价值观',
                'exclusion': '职业排除项'
            };
            return names[type] || '测评';
        }

        function getSectionTagClass(type) {
            const classes = {
                'holland': 'tag-holland',
                'bigfive': 'tag-bigfive',
                'scenario': 'tag-scenario',
                'ability': 'tag-ability',
                'values': 'tag-values',
                'exclusion': 'tag-exclusion'
            };
            return classes[type] || '';
        }

        function updateProgress() {
            const percent = Math.round((currentQuestion / questions.length) * 100);
            document.getElementById('progressPercent').textContent = percent + '%';
            document.getElementById('progressFill').style.width = percent + '%';
            
            const currentQ = questions[currentQuestion];
            document.getElementById('sectionTag').textContent = getSectionName(currentQ.type);
            document.getElementById('sectionTag').className = 'section-tag ' + getSectionTagClass(currentQ.type);
        }

        function renderQuestion() {
            const q = questions[currentQuestion];
            updateProgress();
            
            document.getElementById('questionNumber').textContent = `问题 ${q.id} / ${questions.length}`;
            document.getElementById('questionText').textContent = q.text;
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            if (q.type === 'holland' || q.type === 'bigfive' || q.type === 'ability' || q.type === 'values') {
                // Likert scale
                const scale = document.createElement('div');
                scale.className = 'likert-scale';
                
                const labels = ['非常不同意', '不同意', '一般', '同意', '非常同意'];
                
                for (let i = 1; i <= 5; i++) {
                    const option = document.createElement('div');
                    option.className = 'likert-option' + (answers[q.id] === i ? ' selected' : '');
                    option.innerHTML = `<span class="likert-number">${i}</span><span class="likert-label">${labels[i-1]}</span>`;
                    option.onclick = () => selectLikert(i);
                    scale.appendChild(option);
                }
                container.appendChild(scale);
            } else if (q.type === 'scenario') {
                // Scenario options
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'scenario-options';
                
                q.options.forEach(opt => {
                    const option = document.createElement('div');
                    option.className = 'scenario-option' + (answers[q.id] === opt.type ? ' selected' : '');
                    option.innerHTML = `<div class="scenario-letter">${opt.label}</div><div>${opt.text}</div>`;
                    option.onclick = () => selectScenario(opt.type);
                    optionsDiv.appendChild(option);
                });
                container.appendChild(optionsDiv);
            } else if (q.type === 'exclusion') {
                // Exclusion options
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'exclusion-options';
                
                q.options.forEach(opt => {
                    const option = document.createElement('div');
                    option.className = 'exclusion-option' + (answers[q.id] === opt.exclude ? ' selected' : '');
                    option.innerHTML = `<strong>${opt.label}.</strong> ${opt.text}`;
                    option.onclick = () => selectExclusion(opt.exclude);
                    optionsDiv.appendChild(option);
                });
                container.appendChild(optionsDiv);
            }
            
            // Update nav buttons
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            document.getElementById('nextBtn').textContent = currentQuestion === questions.length - 1 ? '查看结果' : '下一题';
        }

        function selectLikert(value) {
            answers[questions[currentQuestion].id] = value;
            renderQuestion();
            
            // Auto advance after short delay
            setTimeout(() => {
                if (currentQuestion < questions.length - 1) {
                    nextQuestion();
                }
            }, 300);
        }

        function selectScenario(type) {
            answers[questions[currentQuestion].id] = type;
            renderQuestion();
            
            setTimeout(() => {
                if (currentQuestion < questions.length - 1) {
                    nextQuestion();
                }
            }, 300);
        }

        function selectExclusion(exclude) {
            answers[questions[currentQuestion].id] = exclude;
            renderQuestion();
            
            setTimeout(() => {
                if (currentQuestion < questions.length - 1) {
                    nextQuestion();
                }
            }, 300);
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        // ==================== RESULTS CALCULATION ====================
        function calculateResults() {
            // Holland scores
            const hollandScores = {R: 0, I: 0, A: 0, S: 0, E: 0, C: 0};
            let hollandCount = {R: 0, I: 0, A: 0, S: 0, E: 0, C: 0};
            
            // Big Five scores
            const bigFiveScores = {O: 0, C: 0, E: 0, A: 0, N: 0};
            let bigFiveCount = {O: 0, C: 0, E: 0, A: 0, N: 0};
            
            // Abilities
            const abilities = [];
            
            // Values
            const values = [];
            
            // Exclusions
            const exclusions = [];
            
            questions.forEach(q => {
                const answer = answers[q.id];
                if (answer === undefined) return;
                
                if (q.type === 'holland') {
                    hollandScores[q.category] += answer;
                    hollandCount[q.category]++;
                } else if (q.type === 'bigfive') {
                    let score = answer;
                    if (q.category === 'N') {
                        // Reverse score for Neuroticism
                        score = 6 - score;
                    }
                    bigFiveScores[q.category] += score;
                    bigFiveCount[q.category]++;
                } else if (q.type === 'scenario') {
                    hollandScores[answer] += 3;
                    hollandCount[answer]++;
                } else if (q.type === 'ability') {
                    abilities.push({name: q.text, score: answer});
                } else if (q.type === 'values') {
                    values.push({name: q.text, score: answer});
                } else if (q.type === 'exclusion') {
                    exclusions.push(answer);
                }
            });
            
            // Normalize Holland scores to 0-100
            const hollandNormalized = {};
            Object.keys(hollandScores).forEach(key => {
                const max = hollandCount[key] * 5;
                hollandNormalized[key] = max > 0 ? Math.round((hollandScores[key] / max) * 100) : 0;
            });
            
            // Get Holland code (top 3)
            const hollandSorted = Object.entries(hollandNormalized)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3)
                .map(x => x[0]);
            const hollandCode = hollandSorted.join('');
            
            // Normalize Big Five to 0-100
            const bigFiveNormalized = {};
            Object.keys(bigFiveScores).forEach(key => {
                const max = bigFiveCount[key] * 5;
                bigFiveNormalized[key] = max > 0 ? Math.round((bigFiveScores[key] / max) * 100) : 0;
            });
            
            // Sort abilities and values
            abilities.sort((a, b) => b.score - a.score);
            values.sort((a, b) => b.score - a.score);
            
            return {
                holland: hollandNormalized,
                hollandCode: hollandCode,
                bigFive: bigFiveNormalized,
                abilities: abilities,
                values: values,
                exclusions: exclusions
            };
        }

            document.getElementById('hollandDesc').textContent = getHollandDescription(results.hollandCode);
            
            // Draw Radar Chart
            drawRadarChart(results.holland);
            
            // Holland Legend
            renderHollandLegend(results.holland);
            
            // Big Five Chart
            renderBigFiveChart(results.bigFive);
            
            // Recommendations
            renderRecommendations(results);
            
            // Development Focus
            renderDevelopmentFocus(results);
            
            // Environment
            renderEnvironment(results);
            
            // Exclusions
            renderExclusions(results.exclusions);
            
            // Save results
            saveResults(results);
        }

        }

        function drawRadarChart(holland) {
            const canvas = document.getElementById('radarChart');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 120;
            
            const types = ['R', 'I', 'A', 'S', 'E', 'C'];
            const labels = ['现实型(R)', '研究型(I)', '艺术型(A)', '社会型(S)', '企业型(E)', '常规型(C)'];
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            for (let i = 1; i <= 5; i++) {
                ctx.beginPath();
                ctx.strokeStyle = '#e0e0e0';
                ctx.lineWidth = 1;
                for (let j = 0; j < 6; j++) {
                    const angle = (Math.PI * 2 / 6) * j - Math.PI / 2;
                    const x = centerX + Math.cos(angle) * (radius * i / 5);
                    const y = centerY + Math.sin(angle) * (radius * i / 5);
                    if (j === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
            }
            
            // Draw axes
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI * 2 / 6) * i - Math.PI / 2;
                ctx.beginPath();
                ctx.strokeStyle = '#e0e0e0';
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(centerX + Math.cos(angle) * radius, centerY + Math.sin(angle) * radius);
                ctx.stroke();
                
                // Labels
                const labelX = centerX + Math.cos(angle) * (radius + 25);
                const labelY = centerY + Math.sin(angle) * (radius + 25);
                ctx.fillStyle = '#666';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(labels[i], labelX, labelY);
            }
            
            // Draw data
            ctx.beginPath();
            ctx.fillStyle = 'rgba(79, 156, 249, 0.3)';
            ctx.strokeStyle = '#4f9cf9';
            ctx.lineWidth = 2;
            
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI * 2 / 6) * i - Math.PI / 2;
                const value = holland[types[i]] / 100;
                const x = centerX + Math.cos(angle) * (radius * value);
                const y = centerY + Math.sin(angle) * (radius * value);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            // Draw points
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI * 2 / 6) * i - Math.PI / 2;
                const value = holland[types[i]] / 100;
                const x = centerX + Math.cos(angle) * (radius * value);
                const y = centerY + Math.sin(angle) * (radius * value);
                ctx.beginPath();
                ctx.fillStyle = '#4f9cf9';
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function downloadResults() {
            const results = calculateResults();
            const report = generateReport(results);
            
            const blob = new Blob([report], {type: 'text/plain;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `职业测评报告_${results.hollandCode}_${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function retakeAssessment() {

                answers = {};
                document.getElementById('resultsContainer').style.display = 'none';
                document.getElementById('mainHeader').classList.remove('hidden');
                document.getElementById('assessmentContainer').classList.remove('hidden');
                renderQuestion();
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('assessmentContainer').classList.contains('hidden')) return;
            
            if (e.key === 'ArrowLeft') {
                previousQuestion();
            } else if (e.key === 'ArrowRight' || e.key === 'Enter') {

            }
